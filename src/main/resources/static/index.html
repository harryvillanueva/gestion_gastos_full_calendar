<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gestión de Gastos</title>
    <link rel="stylesheet" href="css/global.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
</head>
<body class="body-dashboard">
<script>
    if (!localStorage.getItem('jwt_token')) window.location.href = 'login.html';
</script>

<div class="navbar">
    <h2 style="margin: 0;">Mi Gestión de Gastos 💰 <span id="etiqueta-rol" style="font-size: 14px; background: #007bff; padding: 3px 8px; border-radius: 5px;"></span></h2>
    <div style="display: flex; align-items: center; gap: 20px;">
        <h3 id="caja-saldo" style="margin: 0; padding: 5px 15px; border-radius: 5px; background: white; color: black;">
            Saldo: <span id="saldo-actual">0.00</span> €
        </h3>
        <button onclick="cerrarSesion()" class="btn-danger">Cerrar Sesión</button>
    </div>
</div>

<div style="display: grid; grid-template-columns: 3fr 1fr; gap: 20px; padding-top: 20px;">

    <div class="contenido" style="margin-top: 0;">
        <div id='calendar'></div>
    </div>

    <div class="contenido" style="margin-top: 0; background: #fff3cd; border: 1px solid #ffeeba;">
        <h3 style="margin-top: 0; border-bottom: 2px solid #ffc107; padding-bottom: 10px;">🔔 Notificaciones</h3>
        <ul id="lista-notificaciones" style="list-style: none; padding: 0; font-size: 14px;">
            <li style="padding: 10px; border-bottom: 1px solid #ddd;">No tienes notificaciones nuevas.</li>
        </ul>
    </div>
</div>

<div id="modal-movimiento" class="modal-fondo" style="display: none;">
    <div class="modal-contenido">
        <h3 id="titulo-modal">Añadir Movimiento</h3>
        <p>Fecha: <span id="fecha-seleccionada-texto" style="font-weight: bold;"></span></p>

        <form id="formMovimiento">
            <input type="hidden" id="fecha-seleccionada-input">
            <input type="hidden" id="id-movimiento-input"> <input type="text" id="descripcion" placeholder="Descripción" required>
            <input type="number" id="importe" step="0.01" min="0.01" placeholder="Importe" required>

            <select id="tipo" required style="width: 100%; padding: 10px; margin: 10px 0;">
                <option value="GASTO">Gasto (Restar)</option>
                <option value="INGRESO">Ingreso (Sumar)</option>
            </select>

            <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px;">
                <button type="submit" id="btn-guardar" class="btn-success">Guardar Evento</button>
                <button type="button" id="btn-actualizar" class="btn-primary" style="display: none;">Actualizar</button>
                <button type="button" id="btn-eliminar" class="btn-danger" style="display: none;">Eliminar</button>

                <button type="button" class="btn-secondary" style="background: #6c757d;" onclick="cerrarModal()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
