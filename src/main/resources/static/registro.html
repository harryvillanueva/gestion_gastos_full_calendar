<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestión de Gastos</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="body-centrado">

<div class="contenedor">
    <h2 style="text-align: center;">Crear Cuenta</h2>
    <div id="mensaje" class="mensaje"></div>

    <form id="formRegistro">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellidos" placeholder="Apellidos" required>
        <input type="email" id="email" placeholder="Correo Electrónico" required>
        <input type="text" id="username" placeholder="Usuario (ej. harry_dev)" required>
        <input type="password" id="password" placeholder="Contraseña (Mín. 6 caracteres)" required>
        <input type="hidden" id="rol" value="BASICO">

        <button type="submit" class="btn-success">Registrarme</button>
    </form>

    <a href="login.html" class="link">¿Ya tienes cuenta? Inicia sesión aquí</a>
</div>

<script src="js/app.js"></script>
</body>
</html>
