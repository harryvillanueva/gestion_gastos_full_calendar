<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión de Gastos</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="body-centrado">

<div class="contenedor">
    <h2 style="text-align: center;">Iniciar Sesión</h2>
    <div id="mensajeLogin" class="mensaje"></div>

    <form id="formLogin">
        <input type="text" id="loginUsername" placeholder="Nombre de Usuario" required>
        <input type="password" id="loginPassword" placeholder="Contraseña" required>

        <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <a href="registro.html" class="link" style="color: #28a745;">¿No tienes cuenta? Regístrate aquí</a>
</div>


<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</body>
</html>
