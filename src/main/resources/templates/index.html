<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecero::cabecero-seccion(titulo='Sistema de Gestion de Gastos')}"/>

<body>

<div th:replace="~{fragmentos/navegacion::navegacion-seccion}"/>

<div class="container">
    <div class="container text-center" style="margin:30px">
        <h2> Sistema de Gestion de Finanzas</h2>
    </div>
</div>

<div class="container mb-4">
    <div class="row">

        <div class="col-md-4">
            <div class="card bg-success text-white shadow-sm">
                <div class="card-body">
                    <div class="row">
                        <div class="col">
                            <h3 class="card-title fs-2" th:text="${#numbers.formatDecimal(totalIngresos, 1, 'POINT', 2, 'COMMA') + ' €'}">$0.00</h3>
                            <p class="card-text fs-5">Total Ingresos</p>
                        </div>
                        <div class="col-auto">
                            <i class="bi bi-arrow-up-circle-fill" style="font-size: 4rem; opacity: 0.7;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-danger text-white shadow-sm">
                <div class="card-body">
                    <div class="row">
                        <div class="col">
                            <h3 class="card-title fs-2" th:text="${#numbers.formatDecimal(totalGastos, 1, 'POINT', 2, 'COMMA') + ' €'}">$0.00</h3>
                            <p class="card-text fs-5">Total Gastos</p>
                        </div>
                        <div class="col-auto">
                            <i class="bi bi-arrow-down-circle-fill" style="font-size: 4rem; opacity: 0.7;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm" th:classappend="${balance >= 0 ? 'bg-primary text-white' : 'bg-light text-dark'}">
                <div class="card-body">
                    <div class="row">
                        <div class="col">
                            <h3 class="card-title fs-2" th:text="${#numbers.formatDecimal(balance, 1, 'POINT', 2, 'COMMA') + ' €'}">$0.00</h3>
                            <p class="card-text fs-5">Balance</p>
                        </div>
                        <div class="col-auto">
                            <i class="bi bi-bank" style="font-size: 4rem; opacity: 0.7;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>



<div class="container">
    <div class="my-3">
        <a th:href="@{/agregar}" class="btn btn-primary">Agregar Nuevo Movimiento</a>
    </div>
    <table class="table table-striped table-hover align-middle table-bordered">
        <thead class="table-dark text-center">
        <tr>
            <th scope="col">Id</th>
            <th scope="col">Monto</th>
            <th scope="col">Tipo de Movimiento</th>
            <th scope="col">Fecha de Movimiento</th>
            <th scope="col">Descripcion</th>
            <th scope="col">Categoria</th>
            <th scope="col">Comp.</th>
            <th scope="col"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="movimiento: ${movimientos}"
            th:class="${movimiento.movimientoTipo == 'Ingreso' ? 'table-success' : (movimiento.movimientoTipo == 'Gasto' ? 'table-danger' : '')}">

            <th th:text="${movimiento.idMovimiento}" scope="row"></th>

            <td th:text="${#numbers.formatDecimal(movimiento.monto, 1, 'POINT', 2, 'COMMA') + ' €'}"></td>

            <td th:text="${movimiento.movimientoTipo}"> </td>
            <td th:text="${#dates.format(movimiento.fechaMovimiento, 'dd-MM-yyyy')}" > </td>
            <td th:text="${movimiento.descripcion}" > </td>
            <td th:text="${movimiento.categoria != null ? movimiento.categoria.nombre : 'Sin Categoría'}" > </td>

            <td class="text-center">
                <a th:if="${movimiento.comprobante != null}"
                   th:href="@{/comprobantes/{filename}(filename=${movimiento.comprobante})}"
                   class="btn btn-outline-info btn-sm"
                   target="_blank"  title="Ver Comprobante">
                    <i class="bi bi-file-earmark-arrow-down-fill"></i>
                </a>
            </td>

            <td class="text-center" >
                <div class="container">
                    <a th:href="@{/editar/{id}(id=${movimiento.idMovimiento})}" class="btn btn-warning btn-sm me-3"> <i class="bi bi-pencil-square"></i> </a>
                    <a th:href="@{/eliminar/{id}(id=${movimiento.idMovimiento})}" class="btn btn-danger btn-sm me-3"
                       onclick="confirmarEliminar(event)"><i class="bi bi-trash3"></i> </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{fragmentos/pie-pagina::pie-pagina-seccion}"/>

</body>

</html>
